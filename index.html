<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フラッシュ暗算ゲーム</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 250, 242, 0.92);
      --panel-strong: #fff7ec;
      --text: #2d1d13;
      --muted: #7a6356;
      --accent: #c4632e;
      --accent-strong: #8f3d12;
      --ok: #1f7a53;
      --warn: #b63e2b;
      --border: rgba(89, 54, 32, 0.14);
      --shadow: 0 20px 60px rgba(86, 50, 22, 0.12);
      --font-display: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      --font-body: "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 213, 163, 0.9), transparent 32%),
        radial-gradient(circle at bottom right, rgba(214, 127, 77, 0.28), transparent 28%),
        linear-gradient(160deg, #f8f4ed 0%, #efe4d3 52%, #e8d4bc 100%);
    }

    .shell {
      width: min(680px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .hero {
      padding: 22px 20px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(150deg, rgba(255, 247, 236, 0.96), rgba(250, 236, 217, 0.9));
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 10px;
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-inner {
      padding: 18px;
    }

    .settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label,
    .section-title {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid rgba(89, 54, 32, 0.18);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fffdf8;
      color: var(--text);
      font-size: 16px;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: rgba(196, 99, 46, 0.7);
      box-shadow: 0 0 0 4px rgba(196, 99, 46, 0.12);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(143, 61, 18, 0.18);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .button-row {
      margin: 8px 0 16px;
    }

    .primary {
      color: #fff8f2;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    .button-row .primary {
      width: 100%;
      padding: 16px 20px;
      font-size: 1rem;
    }

    .session-note {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(89, 54, 32, 0.09);
      color: var(--muted);
      line-height: 1.5;
    }

    .display-board {
      display: grid;
      place-items: center;
      min-height: 220px;
      border-radius: 24px;
      border: 1px dashed rgba(143, 61, 18, 0.22);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(253, 243, 229, 0.94)),
        repeating-linear-gradient(
          -35deg,
          rgba(196, 99, 46, 0.03),
          rgba(196, 99, 46, 0.03) 12px,
          transparent 12px,
          transparent 26px
        );
      margin-bottom: 16px;
      overflow: hidden;
    }

    .display-number {
      font-family: var(--font-display);
      font-size: clamp(4rem, 18vw, 7rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(10px) scale(0.98);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .display-number.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .answer-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .answer-row input,
    .answer-row button {
      min-height: 54px;
    }

    .status {
      min-height: 28px;
      margin-top: 14px;
      font-weight: 700;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.warn {
      color: var(--warn);
    }

    .status.neutral {
      color: var(--muted);
    }

    .summary-box {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(255, 250, 242, 0.98), rgba(246, 234, 220, 0.95));
      border: 1px solid rgba(89, 54, 32, 0.09);
      margin-top: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .history-card {
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(196, 99, 46, 0.14), rgba(255, 247, 236, 0.96));
      border: 1px solid rgba(196, 99, 46, 0.16);
    }

    .best-score-value {
      margin: 8px 0 4px;
      font-family: var(--font-display);
      font-size: clamp(2rem, 11vw, 3rem);
      font-weight: 800;
      line-height: 1;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .history-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 249, 241, 0.95);
      border: 1px solid rgba(89, 54, 32, 0.09);
    }

    .history-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .history-item span {
      display: block;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .history-empty {
      padding: 20px;
      border-radius: 18px;
      background: rgba(255, 249, 241, 0.85);
      color: var(--muted);
      border: 1px dashed rgba(89, 54, 32, 0.16);
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 16px, 680px);
        padding: 10px 0 calc(24px + env(safe-area-inset-bottom));
      }

      .hero {
        padding: 16px;
        border-radius: 20px;
      }

      .hero h1 {
        margin-bottom: 8px;
        font-size: clamp(1.6rem, 8vw, 2.3rem);
      }

      .hero p {
        font-size: 0.94rem;
        line-height: 1.55;
      }

      .panel-inner {
        padding: 16px;
      }

      .settings,
      .answer-row {
        grid-template-columns: 1fr;
      }

      .field label,
      .section-title {
        font-size: 0.82rem;
      }

      .button-row {
        margin-bottom: 12px;
      }

      .button-row .primary {
        min-height: 56px;
      }

      .session-note,
      .summary-box,
      .history-item,
      .history-empty {
        font-size: 0.94rem;
      }

      .display-board {
        min-height: 200px;
        border-radius: 20px;
      }

      .display-number {
        font-size: clamp(3.5rem, 22vw, 5.4rem);
      }

      .answer-row {
        position: sticky;
        bottom: 0;
        z-index: 5;
        margin-top: 14px;
        padding: 12px;
        border-radius: 20px;
        background: rgba(248, 244, 237, 0.94);
        backdrop-filter: blur(10px);
        box-shadow: 0 -10px 30px rgba(86, 50, 22, 0.08);
      }

      .answer-row button {
        width: 100%;
        min-height: 56px;
      }

      .history-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>フラッシュ暗算ゲーム</h1>
      <p>
        数字を見て、合計を入れるだけ。片手でも遊びやすい、スマホ向けのシンプル版です。
      </p>
    </section>

    <main class="grid">
      <section class="panel">
        <div class="panel-inner">
          <div class="settings">
            <div class="field">
              <label for="digit-select">桁数</label>
              <select id="digit-select">
                <option value="1">1桁</option>
                <option value="2">2桁</option>
                <option value="3">3桁</option>
              </select>
            </div>
            <div class="field">
              <label for="speed-select">初期表示速度</label>
              <select id="speed-select">
                <option value="0.1" selected>0.1秒</option>
                <option value="0.2">0.2秒</option>
                <option value="0.3">0.3秒</option>
                <option value="0.4">0.4秒</option>
                <option value="0.5">0.5秒</option>
              </select>
            </div>
          </div>

          <div class="button-row">
            <button id="start-button" class="primary" type="button">スタート</button>
          </div>

          <div id="session-note" class="session-note">
            2個の数字から開始します。正解すると1個ずつ増えます。
          </div>

          <div class="display-board" aria-live="polite">
            <div id="display-number" class="display-number">Ready?</div>
          </div>

          <div class="answer-row">
            <input
              id="answer-input"
              type="text"
              inputmode="numeric"
              enterkeyhint="done"
              pattern="-?[0-9]*"
              autocomplete="off"
              placeholder="合計を入力"
              disabled
            >
            <button id="submit-button" class="primary" type="button" disabled>送信</button>
          </div>

          <div id="status-message" class="status neutral">スタートを押すとゲームを始めます。</div>
          <div id="summary-box" class="summary-box">
            ベストと最近の記録だけをこのブラウザに保存します。
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-inner">
          <section class="history-card">
            <div class="section-title">Best</div>
            <div id="best-score-value" class="best-score-value">0</div>
            <div id="best-score-detail" class="status neutral">まだ記録はありません。</div>
            <div id="history-list" class="history-list"></div>
          </section>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "mental-math-history-v1";
    const MIN_SECONDS = 0.1;
    const BASE_COUNT = 2;
    const INITIAL_LIVES = 3;
    const BETWEEN_MS = 140;
    const NEXT_ROUND_DELAY_MS = 900;
    const RESULT_FLASH_MS = 520;

    const state = {
      round: 0,
      currentCount: BASE_COUNT,
      digitLength: 1,
      initialDisplaySeconds: 0.1,
      displaySeconds: 0.1,
      lives: INITIAL_LIVES,
      sequence: [],
      correctSum: 0,
      answerStartedAt: 0,
      lastAnswerMs: null,
      answerTimes: [],
      isShowingSequence: false,
      isAwaitingAnswer: false,
      isTransitioning: false,
      isGameOver: false,
      historyRecords: [],
      pendingTimeout: null
    };

    const elements = {
      digitSelect: document.getElementById("digit-select"),
      speedSelect: document.getElementById("speed-select"),
      startButton: document.getElementById("start-button"),
      submitButton: document.getElementById("submit-button"),
      answerInput: document.getElementById("answer-input"),
      displayNumber: document.getElementById("display-number"),
      statusMessage: document.getElementById("status-message"),
      sessionNote: document.getElementById("session-note"),
      summaryBox: document.getElementById("summary-box"),
      bestScoreValue: document.getElementById("best-score-value"),
      bestScoreDetail: document.getElementById("best-score-detail"),
      historyList: document.getElementById("history-list")
    };

    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          state.historyRecords = [];
          return;
        }
        const parsed = JSON.parse(raw);
        state.historyRecords = Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        state.historyRecords = [];
      }
    }

    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.historyRecords));
    }

    function getMinValueForDigits(digitLength) {
      if (digitLength === 1) return 0;
      return Math.pow(10, digitLength - 1);
    }

    function getMaxValueForDigits(digitLength) {
      if (digitLength === 1) return 9;
      return Math.pow(10, digitLength) - 1;
    }

    function generateNumber(digitLength) {
      const min = getMinValueForDigits(digitLength);
      const max = getMaxValueForDigits(digitLength);
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateSequence(count, digitLength) {
      return Array.from({ length: count }, () => generateNumber(digitLength));
    }

    function computeDisplaySeconds(initialSeconds, round) {
      const step = Math.max(0, round - 1) * 0.02;
      const value = initialSeconds - step;
      return Math.max(MIN_SECONDS, Number(value.toFixed(2)));
    }

    function average(values) {
      if (!values.length) return null;
      const total = values.reduce((sum, value) => sum + value, 0);
      return total / values.length;
    }

    function formatMs(ms) {
      if (ms == null) return "-";
      return `${(ms / 1000).toFixed(2)}秒`;
    }

    function formatSeconds(seconds) {
      return `${seconds.toFixed(1)}秒`;
    }

    function formatDateTime(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return isoString;
      return date.toLocaleString("ja-JP", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function clearPendingTimeout() {
      if (state.pendingTimeout) {
        clearTimeout(state.pendingTimeout);
        state.pendingTimeout = null;
      }
    }

    function sleep(ms) {
      return new Promise((resolve) => {
        state.pendingTimeout = window.setTimeout(() => {
          state.pendingTimeout = null;
          resolve();
        }, ms);
      });
    }

    function setStatus(message, tone) {
      elements.statusMessage.textContent = message;
      elements.statusMessage.className = `status ${tone}`;
    }

    function updateSessionNote() {
      if (state.isGameOver) {
        elements.sessionNote.textContent = `今回の到達ラウンドは ${state.round}。もう一度遊べます。`;
        return;
      }

      if (state.round === 0) {
        elements.sessionNote.textContent = "2個の数字から開始します。正解すると1個ずつ増えます。";
        return;
      }

      elements.sessionNote.textContent =
        `${state.currentCount}個表示 / ${state.digitLength}桁 / 速度 ${formatSeconds(state.displaySeconds)} / 残り${state.lives}回ミス可`;
    }

    function updateControlStates() {
      const playing = state.round > 0 && !state.isGameOver;
      const locked = state.isShowingSequence || state.isTransitioning;
      const canAnswer = state.isAwaitingAnswer && !locked && !state.isGameOver;

      elements.digitSelect.disabled = playing || state.isShowingSequence || state.isTransitioning;
      elements.speedSelect.disabled = playing || state.isShowingSequence || state.isTransitioning;
      elements.startButton.disabled = state.isShowingSequence || state.isTransitioning;
      elements.startButton.textContent = playing ? "やりなおす" : "スタート";
      elements.answerInput.disabled = !canAnswer;
      elements.submitButton.disabled = !canAnswer;
    }

    function renderBestScore() {
      const best = state.historyRecords.reduce((current, record) => {
        if (!current || record.maxRound > current.maxRound) {
          return record;
        }
        return current;
      }, null);

      elements.bestScoreValue.textContent = best ? String(best.maxRound) : "0";
      elements.bestScoreDetail.textContent = best
        ? `${best.digitLength}桁 / 初期 ${best.initialDisplaySeconds.toFixed(1)}秒 / 最速 ${formatMs(best.bestAnswerMs)}`
        : "まだ記録はありません。";
      elements.bestScoreDetail.className = "status neutral";
    }

    function renderHistory() {
      elements.historyList.innerHTML = "";

      if (!state.historyRecords.length) {
        const empty = document.createElement("div");
        empty.className = "history-empty";
        empty.textContent = "最近の記録はここに3件だけ表示されます。";
        elements.historyList.appendChild(empty);
        return;
      }

      const sorted = [...state.historyRecords].sort((a, b) => {
        return new Date(b.playedAt).getTime() - new Date(a.playedAt).getTime();
      }).slice(0, 3);

      for (const record of sorted) {
        const item = document.createElement("article");
        item.className = "history-item";

        const title = document.createElement("strong");
        title.textContent = `${formatDateTime(record.playedAt)} / R${record.maxRound}`;

        const detail = document.createElement("span");
        detail.textContent =
          `${record.digitLength}桁 / ${record.initialDisplaySeconds.toFixed(1)}秒 / ` +
          `最大 ${record.maxCount}個 / 最速 ${formatMs(record.bestAnswerMs)}`;

        item.appendChild(title);
        item.appendChild(detail);
        elements.historyList.appendChild(item);
      }
    }

    function renderSummary(message) {
      elements.summaryBox.textContent = message;
    }

    function showDisplay(text, visible) {
      elements.displayNumber.textContent = text;
      elements.displayNumber.classList.toggle("visible", visible);
    }

    async function flashResult(symbol, value) {
      showDisplay(`${symbol} ${value}`, true);
      await sleep(RESULT_FLASH_MS);
    }

    function resetForNewGame() {
      clearPendingTimeout();
      state.round = 0;
      state.currentCount = BASE_COUNT;
      state.lives = INITIAL_LIVES;
      state.sequence = [];
      state.correctSum = 0;
      state.answerStartedAt = 0;
      state.lastAnswerMs = null;
      state.answerTimes = [];
      state.isShowingSequence = false;
      state.isAwaitingAnswer = false;
      state.isTransitioning = false;
      state.isGameOver = false;
      state.digitLength = Number(elements.digitSelect.value);
      state.initialDisplaySeconds = Number(elements.speedSelect.value);
      state.displaySeconds = state.initialDisplaySeconds;

      elements.answerInput.value = "";
      showDisplay("Ready?", true);
      setStatus("スタートを押すとゲームを始めます。", "neutral");
      renderSummary("ベストと最近の記録だけをこのブラウザに保存します。");
      updateSessionNote();
      updateControlStates();
    }

    function buildRecord() {
      return {
        playedAt: new Date().toISOString(),
        digitLength: state.digitLength,
        initialDisplaySeconds: state.initialDisplaySeconds,
        maxRound: state.round,
        maxCount: Math.max(BASE_COUNT, state.currentCount - 1),
        averageAnswerMs: average(state.answerTimes),
        bestAnswerMs: state.answerTimes.length ? Math.min(...state.answerTimes) : null
      };
    }

    function persistGameResult() {
      const record = buildRecord();
      state.historyRecords.push(record);
      saveHistory();
      renderBestScore();
      renderHistory();
      renderSummary(
        `ゲーム終了。ラウンド ${record.maxRound}、最大 ${record.maxCount}個、最速 ${formatMs(record.bestAnswerMs)}。`
      );
    }

    async function showSequence(sequence) {
      state.isShowingSequence = true;
      state.isAwaitingAnswer = false;
      state.isTransitioning = false;
      updateControlStates();

      for (const value of sequence) {
        showDisplay(String(value), true);
        await sleep(state.displaySeconds * 1000);
        showDisplay("", false);
        await sleep(BETWEEN_MS);
      }

      state.isShowingSequence = false;
      state.isAwaitingAnswer = true;
      state.answerStartedAt = performance.now();
      elements.answerInput.value = "";
      updateControlStates();
      showDisplay("?", true);
      setStatus("合計を入力してください。Enterでも送信できます。", "neutral");
      updateSessionNote();
      elements.answerInput.focus();
    }

    async function startRound() {
      clearPendingTimeout();
      state.isTransitioning = false;
      state.isAwaitingAnswer = false;
      state.round += 1;
      state.displaySeconds = computeDisplaySeconds(state.initialDisplaySeconds, state.round);
      state.sequence = generateSequence(state.currentCount, state.digitLength);
      state.correctSum = state.sequence.reduce((sum, value) => sum + value, 0);

      updateSessionNote();
      setStatus(`ラウンド ${state.round}。${state.currentCount}個の数字を覚えましょう。`, "neutral");
      await showSequence(state.sequence);
      updateSessionNote();
    }

    async function queueNextRound(message, tone) {
      state.isTransitioning = true;
      state.isAwaitingAnswer = false;
      updateControlStates();
      setStatus(message, tone);
      await sleep(NEXT_ROUND_DELAY_MS);
      if (!state.isGameOver) {
        await startRound();
      }
    }

    function gameOver(extraMessage) {
      state.isGameOver = true;
      state.isAwaitingAnswer = false;
      state.isShowingSequence = false;
      state.isTransitioning = false;
      clearPendingTimeout();
      updateControlStates();
      showDisplay("Finish", true);
      setStatus(extraMessage, "warn");
      updateSessionNote();
      persistGameResult();
    }

    async function submitAnswer() {
      if (!state.isAwaitingAnswer || state.isShowingSequence || state.isTransitioning || state.isGameOver) {
        return;
      }

      const rawValue = elements.answerInput.value.trim();
      if (rawValue === "") {
        setStatus("合計を入力してから送信してください。", "warn");
        elements.answerInput.focus();
        return;
      }

      if (!/^-?\d+$/.test(rawValue)) {
        setStatus("整数で入力してください。同じ問題に再挑戦できます。", "warn");
        elements.answerInput.focus();
        elements.answerInput.select();
        return;
      }

      const answerValue = Number(rawValue);
      const elapsedMs = Math.round(performance.now() - state.answerStartedAt);
      state.lastAnswerMs = elapsedMs;
      state.answerTimes.push(elapsedMs);
      updateSessionNote();

      if (answerValue === state.correctSum) {
        const previousCount = state.currentCount;
        state.currentCount += 1;
        updateSessionNote();
        renderSummary(
          `正解。ラウンド ${state.round} は ${previousCount}個の数字でした。` +
          `回答時間は ${formatMs(elapsedMs)}。次は ${state.currentCount}個になります。`
        );
        await flashResult("○", state.correctSum);
        await queueNextRound(`正解です。${formatMs(elapsedMs)} でクリア。次のラウンドへ進みます。`, "ok");
        return;
      }

      state.lives -= 1;
      updateSessionNote();
      await flashResult("×", state.correctSum);

      if (state.lives <= 0) {
        gameOver(`不正解。正解は ${state.correctSum} でした。3回ミスしたため終了です。`);
        return;
      }

      renderSummary(
        `不正解。正解は ${state.correctSum}、入力は ${answerValue} でした。` +
        `残りライフは ${state.lives}。同じ個数で次のラウンドへ進みます。`
      );
      await queueNextRound(
        `不正解。正解は ${state.correctSum} でした。残りライフは ${state.lives}。次のラウンドを始めます。`,
        "warn"
      );
    }

    async function startGame() {
      resetForNewGame();
      setStatus("ゲームを開始します。数字を見逃さないようにしましょう。", "neutral");
      await startRound();
    }

    elements.startButton.addEventListener("click", () => {
      startGame();
    });

    elements.submitButton.addEventListener("click", () => {
      submitAnswer();
    });

    elements.answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitAnswer();
      }
    });

    loadHistory();
    renderBestScore();
    renderHistory();
    resetForNewGame();
  </script>
</body>
</html>
